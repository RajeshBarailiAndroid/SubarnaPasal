<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suvarnapasal — Reset password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page">
    <div class="auth-page-shell auth-page-shell-single">
      <main class="auth-page-main auth-page-main-centered">
        <div class="auth-page-card">
          <h2 class="auth-page-heading" data-i18n="authResetPasswordTitle">Set a new password</h2>
          <p class="auth-page-subheading" data-i18n="authResetPasswordDesc">Choose a new password for your account.</p>

          <form id="reset-password-form" class="auth-form fb-auth-form" novalidate>
            <input type="password" name="password" class="fb-input" autocomplete="new-password" data-i18n-placeholder="authPasswordSignupPlaceholder" placeholder="New password" required />
            <input type="password" name="confirm" class="fb-input" autocomplete="new-password" data-i18n-placeholder="authConfirmPasswordPlaceholder" placeholder="Re-enter password" required />
            <p class="auth-error" id="reset-password-error" hidden></p>
            <button type="submit" class="fb-btn fb-btn-primary fb-btn-pill auth-submit" data-i18n="authResetPasswordBtn">Save new password</button>
          </form>

          <a href="/login.html" class="fb-link-btn auth-page-back-link" data-i18n="authBackToLogin">Back to log in</a>
        </div>
      </main>
    </div>

    <div id="toast" class="toast" hidden></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="i18n.js"></script>
    <script src="auth.js"></script>
    <script src="auth-page-common.js"></script>
    <script src="bg-slider.js"></script>
    <script src="reset-password-page.js"></script>
  </body>
</html>
