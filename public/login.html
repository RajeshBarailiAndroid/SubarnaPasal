<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suvarnapasal — Log in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page">
    <div class="auth-page-shell">
      <section class="auth-page-brand" aria-hidden="true">
        <div class="auth-page-brand-inner">
          <div class="auth-page-logo" aria-hidden="true">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
          </div>
          <h1 class="auth-page-title">Suvarnapasal</h1>
          <p class="auth-page-tagline" data-i18n="authPageTagline">Jewelry inventory, POS, and sales — all in one place.</p>
        </div>
      </section>

      <main class="auth-page-main">
        <div class="auth-page-toolbar">
          <label class="auth-page-lang">
            <span data-i18n="language">Language</span>
            <select id="language-select" aria-label="Language">
              <option value="en">English</option>
              <option value="ne">नेपाली</option>
            </select>
          </label>
        </div>

        <div class="auth-page-card">
          <div id="auth-login-panel" class="auth-panel">
            <h2 class="auth-page-heading" data-i18n="loginTitle">Log into Suvarnapasal</h2>

            <form id="login-form" class="auth-form fb-auth-form" novalidate>
              <input type="text" id="login-username" class="fb-input" autocomplete="username" data-i18n-placeholder="authUsernameFbPlaceholder" placeholder="Username" required />
              <input type="password" id="login-password" class="fb-input" autocomplete="current-password" data-i18n-placeholder="authPasswordFbPlaceholder" placeholder="Password" required />
              <p class="auth-error" id="login-error" hidden></p>
              <button type="submit" class="fb-btn fb-btn-primary fb-btn-pill auth-submit" data-i18n="loginTab">Log in</button>
              <a href="/forgot-password.html" class="fb-link-btn" data-i18n="authForgotPassword">Forgot password?</a>
            </form>

            <div class="auth-page-divider" aria-hidden="true"><span data-i18n="authOr">or</span></div>

            <button type="button" class="fb-btn fb-btn-outline-blue fb-btn-pill" id="show-signup-panel" data-i18n="authCreateAccount">Create new account</button>
          </div>

          <div id="auth-signup-panel" class="auth-panel" hidden>
            <h2 class="auth-page-heading" data-i18n="signUpTitle">Sign Up</h2>
            <p class="auth-page-subheading" data-i18n="signUpTagline">It's quick and easy.</p>

            <form id="signup-form" class="auth-form fb-auth-form" novalidate>
              <input type="text" id="signup-full-name" class="fb-input" autocomplete="name" data-i18n-placeholder="authFullNamePlaceholder" placeholder="Full name" required />
              <input type="text" id="signup-username" class="fb-input" autocomplete="username" data-i18n-placeholder="authUsernameSignupPlaceholder" placeholder="Username" required />
              <input type="email" id="signup-email" class="fb-input" autocomplete="email" data-i18n-placeholder="authEmailPlaceholder" placeholder="Email address" />
              <label class="auth-phone-region-field">
                <span data-i18n="authPhoneRegion">Phone region</span>
                <select id="signup-phone-region" class="fb-input auth-phone-region-select" aria-label="Phone region">
                  <option value="NP" data-i18n-option="authPhoneRegionNP">Nepal (+977)</option>
                  <option value="US" data-i18n-option="authPhoneRegionUS">United States (+1)</option>
                  <option value="CA" data-i18n-option="authPhoneRegionCA">Canada (+1)</option>
                </select>
              </label>
              <input type="tel" id="signup-phone" class="fb-input" autocomplete="tel" data-i18n-placeholder="authPhonePlaceholderNP" placeholder="98XXXXXXXX" />
              <p class="auth-field-hint" id="signup-phone-hint" data-i18n="authEmailOrPhoneHintNP">Email or Nepal mobile number required</p>
              <input type="password" id="signup-password" class="fb-input" autocomplete="new-password" data-i18n-placeholder="authPasswordSignupPlaceholder" placeholder="New password" required />
              <input type="password" id="signup-password-confirm" class="fb-input" autocomplete="new-password" data-i18n-placeholder="authConfirmPasswordPlaceholder" placeholder="Re-enter password" required />
              <p class="auth-error" id="signup-error" hidden></p>
              <button type="submit" class="fb-btn fb-btn-signup fb-btn-pill auth-submit" data-i18n="signUpTab">Sign up</button>
            </form>

            <button type="button" class="fb-link-btn auth-page-back-link" id="show-login-panel" data-i18n="authAlreadyHaveAccount">Already have an account?</button>
          </div>
        </div>
      </main>
    </div>

    <div id="toast" class="toast" hidden></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="i18n.js"></script>
    <script src="phone.js?v=4"></script>
    <script src="auth.js"></script>
    <script src="auth-page-common.js"></script>
    <script src="bg-slider.js"></script>
    <script src="login-page.js"></script>
  </body>
</html>
