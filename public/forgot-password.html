<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suvarnapasal — Forgot password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page">
    <div class="auth-page-shell">
      <section class="auth-page-brand" aria-hidden="true">
        <div class="auth-page-brand-inner">
          <div class="auth-page-logo" aria-hidden="true">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
          </div>
          <h1 class="auth-page-title">Suvarnapasal</h1>
          <p class="auth-page-tagline" data-i18n="authPageTagline">Jewelry inventory, POS, and sales — all in one place.</p>
        </div>
      </section>

      <main class="auth-page-main">
        <div class="auth-page-toolbar">
          <label class="auth-page-lang">
            <span data-i18n="language">Language</span>
            <select id="language-select" aria-label="Language">
              <option value="en">English</option>
              <option value="ne">नेपाली</option>
            </select>
          </label>
        </div>

        <div class="auth-page-card">
          <h2 class="auth-page-heading" data-i18n="authForgotTitle">Forgot password</h2>
          <p class="auth-page-subheading" data-i18n="authForgotDesc">Enter your username and email. We will send a reset link to your inbox.</p>

          <form id="forgot-form" class="auth-form fb-auth-form" novalidate>
            <p class="auth-field-hint" data-i18n="authForgotEmailHint">We will email a reset link to the address on your account.</p>

            <input type="text" name="username" class="fb-input" autocomplete="username" data-i18n-placeholder="authUsernameFbPlaceholder" placeholder="Username" required />
            <input type="email" name="email" class="fb-input" autocomplete="email" data-i18n-placeholder="authEmailPlaceholder" placeholder="Email address" required />

            <p class="auth-error" id="forgot-error" hidden></p>
            <p class="auth-success" id="forgot-success" hidden></p>
            <button type="submit" class="fb-btn fb-btn-primary fb-btn-pill auth-submit" data-i18n="authForgotSendLink">Send reset link</button>
          </form>

          <a href="/login.html" class="fb-link-btn auth-page-back-link" data-i18n="authBackToLogin">Back to log in</a>
        </div>
      </main>
    </div>

    <div id="toast" class="toast" hidden></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="i18n.js"></script>
    <script src="auth.js"></script>
    <script src="auth-page-common.js"></script>
    <script src="forgot-password-page.js"></script>
  </body>
</html>
